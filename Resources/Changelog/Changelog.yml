- author: Dpellowski
  changes:
    - type: Tweak
      message: >-
        Optimized server-side CPU utilization across 12+ systems -
        PowerNetSystem query caching, FlammableSystem alert batching,
        NPCSteeringSystem parallelization overhead removal and array pooling,
        StatusEffectsSystem/MetabolizerSystem reusable list buffers,
        BloodstreamSystem thundering herd fix, ThermalAmbienceSystem throttling,
        StomachSystem O(n) removal, physics tick rate reduction (120→60), and
        NPC update cap (1024→512). Estimated 10-15% total CPU reduction.
