- author: cythisia
  changes:
    - type: Add
      message: >-
        Added a Wasteland Map Pip-Boy program with zoom, pan, player tracking,
        blips, and annotation tools.
    - type: Add
      message: >-
        Added map UI support for Pip-Boys, a tactical map cartridge, and compact
        Brotherhood helmet HUD integration.
    - type: Add
      message: >-
        Added shared faction tactical feeds for Brotherhood and NCR through
        tagged IDs, cartridges, actions, messages, and localization.
    - type: Fix
      message: >-
        Fixed Brotherhood tactical tables, holotags, and objective
        issuer/localization entries to work with the new shared map system.
    - type: Tweak
      message: >-
        Pip-Boys now come preinstalled with the tactical map cartridge and
        updated faction map compatibility.
