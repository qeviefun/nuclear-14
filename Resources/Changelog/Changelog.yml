- author: cythisiax
  changes:
    - type: Add
      message: >-
        Added new admin Whitelisting and Staff tabs, an Admin List
        window/system, and a player quick-action popup.
    - type: Add
      message: >-
        Added new admin and chat commands, including admins, players, whitelist
        slots, and roleplay emote commands like do/em.
    - type: Add
      message: >-
        Added MoMMI Discord relay support, supporting shared events/CVars, and
        new localization entries for the expanded admin UI.
    - type: Tweak
      message: >-
        Reordered and expanded the admin menu, moved Players forward, and
        changed player list clicks to open quick actions on left-click and verbs
        on right-click.
    - type: Tweak
      message: >-
        Updated chat parsing to support slash aliases before channel detection,
        and made minor power armor/prototype adjustments.
  id: 5621
