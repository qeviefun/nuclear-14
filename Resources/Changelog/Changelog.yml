    - type: Add
      message: >-
        Mentorhelp admin permission flag for controlling who receives mentor
        help messages
    - type: Add
      message: MHelp button in lobby and in-game toolbar
    - type: Add
      message: Discord webhook support for relaying MHelp messages
    - type: Add
      message: >-
        Whitelist Search admin panel — search players by name and manage their
