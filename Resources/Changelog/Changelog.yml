    - type: Add
      message: Whitelisting tab in the admin menu (F7)
    - type: Tweak
      message: Remapped F1 to Mentor Help, F2 to Admin Help
    - type: Tweak
      message: >-
        Mentor Message window uses a purple banner to differentiate from AHelp's
        red banner
    - type: Tweak
