    - message: >-
        Merge of all CF and N14. Misfits has done upstream merges with English
        localization of mostly all playable content. This is a huge change and
        there are likely to be many bugs, so please report them if you find
        them. The changelog will be updated as more changes are made, but for
        now this is the main one. Please note that this is not the final merge,
        there will be more merges in the future as we continue to work on the
        project.
