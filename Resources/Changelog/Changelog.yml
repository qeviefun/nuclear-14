- author: cythisiax
  changes:
    - type: Add
      message: >-
        Super Mutant species- full body, organs, parts, species prototype,
        displacement RSI, and custom sprite textures. Current non-mutie sprites
        do not width stretch to arms, but only length. Weird headplacement for
        now. Will just copy and edit 32x32 sprites into 32x48 for SM future. Or
        something else.
    - type: Add
      message: >-
        Super Mutant job role, department, faction, localization (job name,
        description, supervisor).
    - type: Add
      message: >-
        ClothingScale field on SlotDisplacementData for per-species clothing
        size scaling.
    - type: Add
      message: >-
        Client-side clothing scale application from displacement data in
        ClientClothingSystem.
    - type: Add
      message: >-
        BorgHands component & system (replaces HandsFill workaround for borg
        chassis).
    - type: Tweak
      message: >-
        Late-join and profile editor department labels no longer append "jobs"
        suffix.
    - type: Tweak
      message: >-
        HandsFillSystem no longer skips spawning items with empty/tilde IDs —
        simplified null check.
    - type: Fix
      message: >-
        Replaced deprecated HandsFill empty-hand hack on base borg chassis with
        proper BorgHands component.
  id: 5612
  time: '2026-03-06T22:44:01.0000000+00:00'
  url: https://github.com/Misfit-Sanctuary/nuclear-14/pull/31
- author: cythisiax
  changes:
    - type: Add
      message: >-
        HideWithoutWhitelist field on JobPrototype - jobs flagged with this are
        completely hidden from late-join and lobby UI for non-whitelisted
        players.
    - type: Add
      message: >-
        Synthetics and Super Mutant jobs now use hideWithoutWhitelist
        (whitelist-gated visibility).
    - type: Add
      message: FEVMutants department for Super Mutants, separate from Robots.
    - type: Add
      message: >-
        Language trait category and new speech traits locale (Latin Language,
        Polyglot).
    - type: Add
      message: >-
        Misfits guidebook override - rules entry now points to Misfits server
        rules XML.
    - type: Add
      message: >-
        Misfits guidebook locale overrides (rules → "Wiki", nuclear14 →
        "Misfits: Nuclear Wasteland").
    - type: Tweak
      message: >-
        Renamed "Synthetics" department to "Robots"; added weight -100 to both
        Robots and FEVMutants departments.
    - type: Tweak
      message: >-
        Renamed all "Midwest BoS" / "MBoS" / "bos" references to "Brotherhood of
        Steel" across job names, descriptions, access levels, headset channels,
        ghost roles, traits, loadout kits, clothing/armor/helmet entity names,
        encryption keys, flags, guidebooks, and the Wendover map.
    - type: Tweak
      message: >-
        Renamed lathe category "Ammo box" to "Ammunition Boxes" (consolidated
        duplicate locale entry).
    - type: Tweak
      message: Filled in empty psi-trait descriptions (LowPotential, HighPotential).
    - type: Tweak
      message: >-
        Server rules XML rewritten with Vault-Tec terminal theme for both
        Misfits and Nuclear14 rulesets.
    - type: Tweak
      message: >-
        Capitalized and standardized file-renamed marker textures (Prisoner,
        Serf, Slave PNGs).
    - type: Fix
      message: >-
        Removed ~30 unused/orphaned locale files (nyanotrasen, robust-toolbox,
        deltav, station-goal, ghouls, disabilities, etc.) that had no matching
        prototypes.
  id: 5613
  time: '2026-03-06T23:47:31.0000000+00:00'
  url: https://github.com/Misfit-Sanctuary/nuclear-14/pull/32
- author: Cythisiax
  changes:
    - type: Add
      message: >-
        Added species whitelist system (WhitelistRequired, RestrictedJobs,
        JobWhitelistUnlock, Order, RestrictedCustomization) to SpeciesPrototype
        with job restriction enforcement in character editor and late-join
    - type: Add
      message: Added Robot as a new Misfits species prototype
    - type: Add
      message: Added Misfits lobby background prototype and texture (1920x1080PSB)
    - type: Add
      message: Added wood door recipes and construction graph nodes for N14
    - type: Add
      message: Added loadout locale entries for Duffel and Satchel categories
    - type: Add
      message: >-
        Added numerous localization files for Misfits and Nuclear14 content
        (clothing, structures, weapons, furniture, etc.)
    - type: Fix
      message: >-
        Fixed double-localization in PlayerTab, AtmosMonitoringEntryContainer,
        and PowerMonitoringWindow (use already-resolved EntityName strings)
    - type: Fix
      message: >-
        Fixed TTS regex using source-generated cached Regex methods to resolve
        RA0026 and improve performance
    - type: Fix
      message: Fixed lobby background prototypes not being registered/loaded
    - type: Fix
      message: >-
        Fixed HumanoidProfileEditor blank DescriptionTab being selected for
        restricted species; hidden tab removed from XAML and code
    - type: Fix
      message: >-
        Fixed LoadoutPreferenceSelector double-localization by using loadoutDesc
        directly
    - type: Fix
      message: >-
        Fixed bark voice prototypes sorting by raw Name instead of calling
        Loc.GetString
    - type: Fix
      message: Fixed redundant localization calls in MarkingPicker
    - type: Fix
      message: >-
        Fixed short key/voice names being treated as display text in
        BoundKeyHelpers and Barks
    - type: Fix
      message: Fixed profile name not being applied to spawned job entities
    - type: Fix
      message: Removed unused IEntityManager from PortalAutoLinkSystem
    - type: Tweak
      message: Lowered NuclearMapFix log level from Error to Info
    - type: Tweak
      message: Commented out some Corvax/N14 lobby screen entries
    - type: Tweak
      message: Added size to Gamma Gulp Beer item to match other bottles
    - type: Tweak
      message: >-
        HumanoidProfileEditor now hides
        Appearance/Jobs/Antags/Traits/Loadouts/Markings tabs for restricted
        species and sorts species by Order and whitelist/unlock
  id: 5614
  time: '2026-03-07T13:58:52.0000000+00:00'
  url: https://github.com/Misfit-Sanctuary/nuclear-14/pull/33
- author: Cythisiax
  changes:
    - type: Add
      message: >-
        Added AllowedLoadoutCategories field to SpeciesPrototype so species can
        restrict which loadout categories are visible in the character editor
    - type: Add
      message: >-
        Added mob_sounds prototype file for Misfits, wiring up all new mob audio
        collections
    - type: Add
      message: >-
        Added audio files for 19 mob types (Assaultron, Bloatfly, Cazador,
        Centaur, Deathclaw, Dog, Eyebot, Gecko, Ghoul, Gutsy, Handy, Molerat,
        Nightstalker, Protectron, Radscorpion, Roach, Scorpion, Sentry,
        Supermutant) with idle/aggro/taunt/death/attack variants
    - type: Add
      message: Added SolaceGrace lobby background texture and prototype entry
    - type: Add
      message: Added audio attributions file for new mob sounds
    - type: Fix
      message: >-
        Character editor now skips applying job clothes when a species has
        RestrictedJobs and the preferred job is not in that list
    - type: Fix
      message: >-
        Empty job department categories are now hidden instead of rendering
        blank containers in both RefreshJobs and UpdateRoleRequirements
    - type: Fix
      message: >-
        Cyborg name placeholder no longer calls Loc.GetString on names that are
        already display text, preventing broken placeholder strings
    - type: Fix
      message: >-
        Loadout list now filters by species AllowedLoadoutCategories so
        restricted species only see relevant loadout options
    - type: Tweak
      message: >-
        Revised RestrictedCustomization behavior — previously hid Appearance,
        Jobs, Loadouts, Antags, Traits, and Markings tabs; now only hides
        Antags, Traits, and Markings (Appearance and Jobs tabs restored for
        restricted species)
    - type: Tweak
      message: >-
        Loadouts tab visibility for restricted species now depends on whether
        AllowedLoadoutCategories has entries, rather than being unconditionally
        hidden
    - type: Tweak
      message: >-
        Moved job filtering logic earlier in RefreshJobs/UpdateRoleRequirements
        so empty-department detection works correctly before containers are
        created
    - type: Tweak
      message: >-
        Updated Nuclear14 NPC entities (animals, ghouls, insects, lizards,
        robots, pets) to reference new mob sound collections
    - type: Tweak
      message: >-
        Expanded Supermutant species entity with additional components and
        configuration
  id: 5615
  time: '2026-03-07T18:33:24.0000000+00:00'
  url: https://github.com/Misfit-Sanctuary/nuclear-14/pull/34
