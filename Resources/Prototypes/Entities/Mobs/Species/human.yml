# Anything human specific (e.g. UI, input) goes under MobHuman
- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobHuman
  name: Urist McHands
  abstract: true
  components:
  - type: Perishable
    rotAfter: 1800 # Half an in-game day.
  - type: Hunger # Forge-Change
    hungerThresholdDecayModifiers:
      Overfed: 1
      Okay: 0.6
      Peckish: 0.5
      Starving: 0.4
      Dead: 0
    starvationDamage:
      types:
        Cold: 0.15 # Misfits Change - use Cold damage for Malnutrition instead of custom Starvation type (no brute/bleed from hunger)
    starvingSlowdownModifier: 0.5
  - type: Icon # It will not have an icon in the adminspawn menu without this. Body parts seem fine for whatever reason.
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: Thirst
    dehydrationDamage:
      types:
        Cold: 0.15 # Misfits Change - use Cold damage for Dehydration instead of custom Dehydration type (no brute/bleed from thirst)
  - type: Carriable # Carrying system from nyanotrasen.
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeatHuman
        amount: 5
  - type: HumanoidAppearance
    species: Human
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: LanguageKnowledge
    speaks:
    - English
    understands:
    - English
  - type: FootPrints
  - type: PsionicInsulation
#  - type: Ghoulify # Forge-Change
  - type: GhoulifyOnRadiationDeath # #Misfits Change: humans who die to radiation become ghouls instead

- type: entity
  parent: BaseSpeciesDummy
  id: MobHumanDummy
  categories: [ HideSpawnMenu ]
