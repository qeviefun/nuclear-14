- type: loadout
  id: LoadoutClothingOuterNCRPouchedVestDesert
  category: Outer
  cost: 2
  exclusive: true
  requirements:
  - !type:CharacterJobRequirement
    jobs:
    - NCRSoldier
    #- NCREngineer #Misfits Change /Comment-out/: consolidated into Specialist
    #- NCRMedic #Misfits Change /Comment-out/: consolidated into Specialist
    - NCRWS # #Misfits Add - Specialist absorbs former Engineer/Medic
    - NCRCadet # Misfits Change /Add/: expand access to all NCR roles
    - NCRPrivateFirstClass
    - NCRMedic
    - NCREngineer
    - NCRDoctor
    - NCRSGT
    - NCRStaffSergeant
    - NCRFirstSergeant
    - NCRLT
    - NCRCaptain
    - NCRMajor # Misfits Add: NCRMajor was missing from NCR armor loadout
    - NCRMPinvestigator
    - NCRFieldRanger # #Misfits Fix - renamed from NCRRanger
    - NCRVeteranRanger #Misfits Change - consolidated NCRRangerVeteran into RangerVeteran
  - !type:CharacterPlaytimeRequirement
    tracker: NCRSoldier
    min: 12000 # 5 hours veterancy unlock
  items:
  - N14ClothingOuterNCRPouchedVestDesert

