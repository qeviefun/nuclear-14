- type: loadout
  id: LoadoutClothingOuterNCRCombatVeteranArmorDesert
  category: Outer
  cost: 4
  exclusive: true
  requirements:
  - !type:CharacterJobRequirement
    inverted: true
    jobs:
    - SuperMutant
    - Nightkin
    - SuperMutantGladiator
    - SuperMutantRanger
    - SuperMutantTrooper
    - SuperMutantTribal
