# #Misfits Add - Pet companion traits for the Pets perk tree (globally available, no role restrictions)

# Dog Companion — generic wasteland dog, available to all roles, costs 8 perk points
- type: trait
  id: N14PetDogCompanion
  category: Pets
  points: -8
  functions:
    - !type:TraitAddComponent
      components:
        # Creates a ghost role so another player can take control of the companion dog
        - type: GhostRole
          name: ghost-role-information-n14pet-dog-name
          description: ghost-role-information-n14pet-generic-description
          rules: ghost-role-component-default-rules
        # Spawns the N14MobPetDog entity at the player's location at round start
        - type: GhostRoleMobSpawner
          prototype: N14MobPetDog

