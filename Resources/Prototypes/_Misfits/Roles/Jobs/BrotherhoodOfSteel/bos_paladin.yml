#Misfits Change /Add/: New consolidated Brotherhood Paladin job.
- type: job
  id: BoSPaladin
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true
  weight: 50
  showBorder: true
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-paladin
  description: job-description-bos-paladin
  playTimeTracker: BoSPaladin
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
      - Ghoul
    - !type:CharacterDepartmentTimeRequirement
      department: BrotherhoodOfSteel
      min: 0 # #Misfits Tweak - BoS unlocked up to Senior
  startingGear: BoSPaladinGear
  alwaysUseSpawner: true
  icon: "JobIconBosMPaladin"
  supervisors: job-supervisors-bos-paladin
  accessGroups:
  - BOSPaladin
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel

- type: startingGear
  id: BoSPaladinGear
  equipment:
    jumpsuit: N14ClothingUniformBosRecon
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadHatCapkhighBoS
    outerClothing: N14ClothingOuterPowerArmorT45
    hands: N14ClothingHandsGlovesCombat
    pocket1: BoSBrotherhoodPaladinKits
    id: N14IDBrotherhoodOfSteelHolotagPaladin
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: N14ClothingBeltBoSWebbing
  storage:
    back:
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSPaladin
