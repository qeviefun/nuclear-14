- type: job
  id: BoSMidPaladinCommander
  setPreference: true
  hideWithoutJobWhitelist: false # #Misfits Tweak - BoS Heads not whitelisted
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 110
  showBorder: true
  overrideConsoleVisibility: false
  canBeAntag: true
  name: job-name-bos-mid-paladin-comm
  description: job-description-bos-mid-paladin-comm
  playTimeTracker: BoSMidPaladinCommander
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
    - !type:CharacterDepartmentTimeRequirement
      department: BrotherhoodOfSteel
      min: 0 # #Misfits Tweak - gated by Senior Paladin role time instead
    - !type:CharacterPlaytimeRequirement # #Misfits Tweak - 20 hours as Senior Paladin to unlock Head Paladin
      tracker: BoSMidPaladin
      min: 72000 # 20 hours
    - !type:CharacterLogicOrRequirement
      requirements:
        - !type:CharacterSpeciesRequirement
          species:
            - Human
            - Ghoul
  startingGear: BoSMidPaladinCommanderGear
  alwaysUseSpawner: true
  icon: "JobIconBosMCommander" # Corvax-Change
  supervisors: job-supervisors-bos-mid-commander
  accessGroups:
  - BOSHeadPaladin
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel

- type: startingGear
  id: BoSMidPaladinCommanderGear
  equipment:
    jumpsuit: N14ClothingUniformBosRecon  #Misfits Change /Tweak/: New consolidated BoS gear
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadHatBeretknighBoS
    outerClothing: N14ClothingOuterPowerArmorWashT51Elite #Misfits Tweak: Head Paladin wears T-51b (was T-51BC commander)
    hands: N14ClothingHandsGlovesCombat
    pocket1: BoSBrotherhoodHeadPaladinKits
    id: N14IDBrotherhoodOfSteelHolotagHeadPaladin
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: N14ClothingBeltBoSWebbing
  storage:
    back:
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSMidPaladinCommander
