- type: job
  id: BoSWestScribe
  setPreference: true
  hideWithoutJobWhitelist: false # #Misfits Tweak - BoS Heads not whitelisted
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 90
  name: job-name-bos-west-scribe
  description: job-description-bos-west-scribe
  playTimeTracker: BoSWestScribe
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T7 faction timelock (40h BoS)
      department: BrotherhoodOfSteel
      min: 144000 # 40 hours
  startingGear: BoSWestScribeGear
  alwaysUseSpawner: true
  icon: "JobIconBosMScriptor"
  supervisors: job-supervisors-bos-west
  accessGroups:
  - BOSHeadScribe
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
      - type: CPRTraining
      - type: LanguageKnowledge # #Misfits Add: Scribes speak and understand Brotherhood binary code by default.
        speaks:
          - English
          - N14BrotherBeep
        understands:
          - English
          - N14BrotherBeep
      - type: RobotWeaponPickupBlacklist # #Misfits Add: Scribes use robot's no weapon pickup component as an alternative to pacifism.
        blacklist:
          components:
          - Gun

- type: startingGear
  id: BoSWestScribeGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack  #Misfits Change /Tweak/: New consolidated BoS gear
    # outerClothing: N14ClothingOuterBrotherhoodMidwestFieldScribeCoat # #Misfits Removed - Coat now comes from loadout kit selection
    back: N14ClothingBackpackSatchelMilitary
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadHatBeretknighBoS
    pocket1: BoSBrotherhoodHeadScribeKits
    id: N14IDBrotherhoodOfSteelHolotagHeadScribe
    ears: N14ClothingHeadsetBrotherhoodOfSteelScribe
    belt: ClothingBeltMilitary
  storage:
    back:
    - NCClothingOuterBosReconArmor
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSWestScribe
