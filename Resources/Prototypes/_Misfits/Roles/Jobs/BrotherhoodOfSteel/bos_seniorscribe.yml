- type: job
  id: BoSMidScribe
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 60
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-mid-scribe
  description: job-description-bos-mid-scribe
  playTimeTracker: BoSMidScribe
  requirements:
    - !type:CharacterSpeciesRequirement # BoS does not accept Ghouls or Glowing Ghouls
      species:
      - Human
    - !type:CharacterDepartmentTimeRequirement
      department: BrotherhoodOfSteel
      min: 57600 # 16 hours
    - !type:CharacterPlaytimeRequirement
      tracker: BoSScribe
      min: 28800 # 8 hours as Scribe
  startingGear: BoSMidScribeGear
  alwaysUseSpawner: true
  icon: "JobIconBosMScriptor" # Corvax-Change
  supervisors: job-supervisors-bos-mid
  accessGroups:
  - BOSSeniorScribe
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
      - type: CPRTraining
      - type: LanguageKnowledge # #Misfits Add: Scribes speak and understand Brotherhood binary code by default.
        speaks:
          - English
          - N14BrotherBeep
        understands:
          - English
          - N14BrotherBeep
      - type: RobotWeaponPickupBlacklist # #Misfits Add: Scribes use robot's no weapon pickup component as an alternative to pacifism.
        blacklist:
          components:
          - Gun

- type: startingGear
  id: BoSMidScribeGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack  #Misfits Change /Tweak/: New consolidated BoS gear
    back: N14ClothingBackpackSatchelMilitary
    shoes: N14ClothingBootsLeatherFilled
    # outerClothing: N14ClothingOuterBrotherhoodMidwestFieldScribeCoat # #Misfits Removed - Coat now comes from loadout kit selection
    pocket1: BoSBrotherhoodSeniorScribeKits
    id: N14IDBrotherhoodOfSteelHolotagSeniorScribe
    ears: N14ClothingHeadsetBrotherhoodOfSteelScribe
    belt: ClothingBeltMilitary
  storage:
    back:
    - NCClothingOuterBosReconArmor
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSMidScribe
