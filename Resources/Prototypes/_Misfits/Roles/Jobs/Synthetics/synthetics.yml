# Synthetics jobs: playable Mr. Handy, Protectron, Mr. Gutsy, and Assaultron robot roles.
# Players spawn directly into the robot body via jobEntity.

- type: job
  id: SyntheticMrHandy
  name: job-name-synthetic-mr-handy
  description: job-description-synthetic-mr-handy
  playTimeTracker: SyntheticMrHandy
  icon: JobIconBorg
  supervisors: job-supervisors-synthetic
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  nameDataset: NamesAI
  spawnLoadout: false
  applyTraits: false
  jobEntity: N14PlayerSyntheticMrHandy
  requirements:
    - !type:CharacterWhitelistRequirement
    - !type:CharacterPlaytimeRequirement
      tracker: SyntheticMrHandy
      min: 35996400 # 9999 hours

