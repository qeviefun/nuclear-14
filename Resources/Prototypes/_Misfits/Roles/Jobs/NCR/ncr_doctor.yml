- type: job
  id: NCRDoctor
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: true # #Misfits Change
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 100
  showBorder: true
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-ncr-doctor
  description: job-description-ncr-doctor
  playTimeTracker: NCRDoctor
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
      - Ghoul
    - !type:CharacterDepartmentTimeRequirement
      department: NCR
      min: 0
    - !type:CharacterPlaytimeRequirement
      tracker: NCRMedic
      min: 0
  startingGear: NCRDoctorGear
  icon: "JobIconNcrMedic"
  supervisors: job-supervisors-ncr-lt
  alwaysUseSpawner: true
  access:
  - NCR
  - NCRMedic
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - NCR
      - type: CPRTraining

- type: startingGear
  id: NCRDoctorGear
  equipment:
    jumpsuit: N14ClothingUniformNCRDesert # Corvax-Change
    outerClothing: N14ClothingOuterNCRPouchedVestDesert # Forge-Change
    back: N14ClothingBackpackNCR # Corvax-Change
    shoes: N14ClothingBootsLeatherFilled
    id: N14IDNCRDogtagDoctorSenior
    pocket2: NCRmedicloadoutkits
  innerClothingSkirt: N14ClothingUniformNCRDesert # Corvax-Change
  satchel: N14ClothingBackpackSatchelNCRFilled
  storage: # Corvax-Change
    back:
    - N14BoxPlasticFilledMilitaryNCR

- type: playTimeTracker
  id: NCRDoctor
