# ===========================================================================
# SECTION B – BLUEPRINT CRAFTING RECIPES (result = final armor, found via AddStorageBlueprintRecipes)
#
# These are NOT added to any workbench staticRecipes.  They are discovered
# automatically when the matching blueprint entity is inside the workbench
# storage container.  See Content.Server/Lathe/LatheSystem.cs
# AddStorageBlueprintRecipes() for the lookup logic.
#
# Material cost = only the fabric items from the hand-crafting recipes:
#   Cloth  : 100 per MaterialCloth1 unit required
#   Thread : 100 per N14MaterialThread1 unit required
# ===========================================================================

# --- Brotherhood of Steel ---

# N14ClothingOuterMBoSInitiateArmorRecipe requires: Cloth x1, Thread x2
- type: latheRecipe
  id: N14ClothingOuterMBoSInitiateArmorBlueprintCraft
  result: N14ClothingOuterMBoSInitiateArmor
  category: N14Armor
  completetime: 7
  availableFaction:
    - BrotherhoodOfSteel
  materials:
    Cloth: 100
    Thread: 200

