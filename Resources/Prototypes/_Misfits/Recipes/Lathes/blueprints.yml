# #Misfits Add: Faction blueprint lathe recipes.
#
# Two groups of recipes in this file:
#
# SECTION A — Blueprint PRINTING recipes (workbench → blueprint paper item from Paper: 100)
#   These allow players to print faction blueprint items at the armor workbench.
#   The result entity has STBlueprintComponent so these appear in the Blueprint tab of the lathe UI.
#
# SECTION B — Blueprint CRAFTING recipes (workbench → faction armor when blueprint is in storage)
#   These are discovered dynamically by AddStorageBlueprintRecipes when the matching blueprint item
#   is placed inside the workbench's storage container.  They appear in the Items tab because the
#   result entity is the actual armor (no STBlueprintComponent).  Materials only cover the fabric
#   ingredients (Cloth + Thread); the base-armor item requirement from the hand-crafting recipe is
#   intentionally omitted here since the lathe system cannot consume physical entity items.
#
# Faction coverage: Brotherhood of Steel, Caesar's Legion, New California Republic (armor only).
# Power-armor conversions at N14WorkbenchStation use the hand-crafting system exclusively.

# ===========================================================================
# SECTION A – BLUEPRINT PRINTING RECIPES (result = blueprint item, cost = Paper)
# ===========================================================================

