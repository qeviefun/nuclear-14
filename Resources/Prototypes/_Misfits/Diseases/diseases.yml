# --- SPORE SICKNESS ---
# Fungal disease from irradiated spore clouds.
# Causes coughing, breathing difficulty, lung damage.
- type: disease
  id: SporeSickness
  name: disease-spore-sickness-name
  infectious: true
  airborne: true
  contactSpread: 0.35
  cureResist: 0.2
  tickTime: 3.0
  stages:
    - 25.0
    - 75.0
    - 150.0
  effects:
    - !type:DiseaseSnough
      probability: 0.25
      stages: [0, 1, 2]
      emoteId: Cough
      airTransmit: true
    - !type:DiseasePopUp
      probability: 0.15
      stages: [0, 1]
      message: disease-spore-sickness-popup-cough
    - !type:DiseaseGenericStatusEffect
      probability: 0.1
      stages: [1, 2]
      key: Jitter
      duration: 4.0
    - !type:DiseaseAdjustReagent
      probability: 0.08
      stages: [2, 3]
      reagent: Lexorin
      amount: 2.0
    - !type:DiseaseHealthChange
      probability: 0.1
      stages: [3]
      damage:
        Asphyxiation: 3
  cures:
    # #Misfits Tweak - AntidoteMixture for fungal spore toxin
    - !type:DiseaseReagentCure
      reagent: AntidoteMixture
      minAmount: 10.0
    - !type:DiseaseBodyTemperatureCure
      threshold: 320.0
      mustBeAbove: true

# --- NEW PLAGUE ---
# Extremely dangerous pre-war bioweapon. Hard to cure.
# High damage, high spread, high cure resistance.
- type: disease
  id: NewPlague
  name: disease-new-plague-name
  infectious: true
  airborne: true
  contactSpread: 0.6
  cureResist: 0.5
  tickTime: 2.5
  stages:
    - 20.0
    - 60.0
    - 120.0
    - 200.0
  effects:
    - !type:DiseaseSnough
      probability: 0.3
      stages: [0, 1, 2]
      emoteId: Cough
      airTransmit: true
    - !type:DiseasePopUp
      probability: 0.2
      stages: [0]
      message: disease-new-plague-popup-chills
    - !type:DiseaseGenericStatusEffect
      probability: 0.2
      stages: [1, 2]
      key: Jitter
      duration: 5.0
    - !type:DiseaseVomit
      probability: 0.15
      stages: [2, 3]
      thirstAmount: -50.0
      hungerAmount: -50.0
    - !type:DiseaseGenericStatusEffect
      probability: 0.12
      stages: [3, 4]
      key: TemporaryBlindness
      duration: 6.0
    - !type:DiseaseHealthChange
      probability: 0.15
      stages: [3, 4]
      damage:
        Poison: 4
        Cellular: 2
  cures:
    # #Misfits Tweak - Hydra (ScorpionTail+Fungus+NightstalkerBlood) hardest cure for deadliest plague
    - !type:DiseaseReagentCure
      reagent: Hydra
      minAmount: 20.0

