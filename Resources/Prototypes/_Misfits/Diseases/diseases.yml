- type: disease
  id: WastelandFever
  name: disease-wasteland-fever-name
  infectious: true
  airborne: false
  contactSpread: 0.2
  cureResist: 0.25
  tickTime: 4.0
  stages:
    - 30.0
    - 100.0
    - 200.0
  effects:
    - !type:DiseasePopUp
      probability: 0.25
      stages: [0, 1]
      message: disease-wasteland-fever-popup-hot
    - !type:DiseaseGenericStatusEffect
      probability: 0.15
      stages: [1, 2]
      key: Stutter
      duration: 5.0
    - !type:DiseaseSnough
      probability: 0.12
      stages: [1, 2, 3]
      emoteId: Cough
