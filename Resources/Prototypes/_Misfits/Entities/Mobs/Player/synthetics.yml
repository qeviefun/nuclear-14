# Player-controlled Synthetic robots for the Misfits server.
# These inherit directly from N14BaseRobotChassis so they do NOT have the
# GhostRole component that pre-placed map robots carry.

- type: entity
  parent: N14BaseRobotChassis
  id: N14BasePlayerSynthetic
  abstract: true
  components:
  - type: Stripping # #Misfits Change: allow player robots to open strip UI with hover + E

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticMrHandy
  name: mr. handy
  suffix: player, synthetic
  description: A General Atomics Mr. Handy domestic servant robot, now guided by a living mind.
  components:
  - type: HumanoidAppearance
    species: RobotMrHandy
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/mrhandyclaw.rsi
    layers:
    - state: icon
      map: ["movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: StepTriggerImmune
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups
  - type: EmitBuzzWhileDamaged # #Misfits Change: sparks/buzz when below half health

  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleDiagnosis
        - BorgModuleTreatment
        - BorgModuleSurgery
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCard
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticProtectron
  name: protectron
  suffix: player, synthetic
  description: A RobCo Industries Protectron security robot, now guided by a living mind.
  components:
  - type: HumanoidAppearance
    species: RobotProtectron
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/protectron.rsi
    layers:
    - state: icon
      map: ["movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.0
    baseSprintSpeed: 3.5
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups
  - type: EmitBuzzWhileDamaged # #Misfits Change: sparks/buzz when below half health

  - type: Tag # #Misfits Change: Protectron walks, so it should have footstep sounds
    tags:
    - DoorBumpOpener
    - CanPilot
    - FootstepSound
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCardRobCo # RobCo Industries Navigation
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

