#Misfits Change /Add/: NCR rank-specific loadout kit flavors.

- type: UndecidedLoadoutBackpackSet
  id: NCRA_PFCFireteamSet
  name: Private First Class Fireteam Kit
  description: Includes NCR pouches, a carbine with 3 long magazines, a 9mm pistol with 2 magazines, a handheld radio, a smoke grenade, a C ration MRE, a stimpak, a Rad-X pill, a gauze pack, and a flare.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: pointman
  content:
  - KitNCR_PFCFireteam

- type: UndecidedLoadoutBackpackSet
  id: NCRA_CorporalPatrolSet
  name: Specialist Patrol Leader Kit
  description: Includes a metal helmet, an NCR belt, a scoped service rifle with 4 magazines, a 9mm pistol with 2 magazines, a handheld radio, 2 smoke grenades, a C ration MRE, a stimpak, a RadAway blood bag, a gauze pack, and a flare.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: marksman
  content:
  - KitNCR_CorporalPatrol

- type: UndecidedLoadoutBackpackSet
  id: NCRA_StaffSergeantLineSet
  name: Staff Sergeant Linebreaker Kit
  description: Includes NCR combat armor, an NCR belt, a sergeant first class pin, a battle rifle with 6 clips, a 9mm pistol with 2 magazines, a handheld radio, a smoke grenade, a C ration MRE, a stimpak, a super stimpak, a RadAway blood bag, a gauze pack, and a flare.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: rifleman
  content:
  - KitNCR_StaffSergeantLine

- type: UndecidedLoadoutBackpackSet
  id: NCRA_FirstSergeantVeteranSet
  name: Sergeant First Class Veteran Kit
  description: Includes an NCR trench coat, a loaded revolver belt, a master sergeant pin, a battle rifle with 6 clips, a handheld radio, 2 smoke grenades, a stick of dynamite, a C ration MRE, a stimpak, a super stimpak, a RadAway blood bag, 2 gauze packs, and a flare. # #Misfits Fix - frag grenade replaced with dynamite
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: pointman
  content:
  - KitNCR_FirstSergeantVeteran

- type: UndecidedLoadoutBackpackSet
