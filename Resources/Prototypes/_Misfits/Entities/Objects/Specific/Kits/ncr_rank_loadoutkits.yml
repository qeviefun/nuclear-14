#Misfits Change /Add/: NCR rank-specific loadout kit flavors.

- type: UndecidedLoadoutBackpackSet
  id: NCRA_PFCFireteamSet
  name: private first class fireteam kit
  description: A junior fireteam leader package built around a serviceable carbine, spare supplies, and smoke for maneuver.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: pointman
  content:
  - KitNCR_PFCFireteam

- type: UndecidedLoadoutBackpackSet
  id: NCRA_CorporalPatrolSet
  name: corporal patrol leader kit
  description: A patrol leader loadout with a scoped service rifle and field-control tools for NCR line leadership.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: marksman
  content:
  - KitNCR_CorporalPatrol

- type: UndecidedLoadoutBackpackSet
  id: NCRA_StaffSergeantLineSet
  name: staff sergeant linebreaker kit
  description: A veteran line NCO package with a battle rifle and extra sustain for holding the center.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: rifleman
  content:
  - KitNCR_StaffSergeantLine

- type: UndecidedLoadoutBackpackSet
  id: NCRA_FirstSergeantVeteranSet
  name: first sergeant veteran kit
  description: A hardened senior NCO loadout for frontline oversight, rallying troops, and surviving long pushes.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: pointman
  content:
  - KitNCR_FirstSergeantVeteran

- type: UndecidedLoadoutBackpackSet
  id: NCRA_CaptainCommandSet
  name: captain command kit
  description: A command package for an NCR captain who expects to lead from just behind the line, not from a tent.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: rifleman
  content:
  - KitNCR_CaptainCommand

- type: UndecidedLoadoutBackpackSet
  id: NCRA_CaptainMarksmanSet
  name: captain frontier marksman kit
  description: A stronger officer marksman package for wasteland campaigns where the captain has to solve problems personally.
  sprite:
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: marksman
  content:
  - KitNCR_CaptainMarksman

- type: entity
  name: private first class fireteam kit
  parent: KitBase
  id: KitNCR_PFCFireteam
  description: A crate containing trusted fireteam gear for a dependable NCR private first class.
  components:
  - type: Sprite
    state: pointman
  - type: Item
    size: Huge
  - type: SpawnItemsOnUse
    items:
      - id: ClothingBeltNCRPouches
      - id: N14WeaponRifle556Carbine
      - id: LongMagazine556Rifle
        amount: 3
      - id: N14WeaponPistol9mm
      - id: N14MagazinePistol9mm
        amount: 2
      - id: RadioHandheld
      - id: SmokeGrenade
      - id: N14BoxCardboardMREBoxCFilled
      - id: N14Stimpak
      - id: N14RadXPill
      - id: N14CleanGauze10
      - id: N14Flare
    sound:
      path: /Audio/Effects/unwrap.ogg

