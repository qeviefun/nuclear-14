# #Misfits Add - Enclave role-specific undecided loadout kits.

- type: entity
  id: EnclaveOfficerloadoutkits
  name: Undecided Enclave Officer Loadout Kit
  parent: BaseLoadoutKit
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Misc/kits.rsi
    state: pointman
  - type: UndecidedLoadoutBackpack
    possibleSets:
    - Enclave_CommandLaserSet
    - Enclave_CommandShockSet
    - Enclave_CommandPlasmaSet

