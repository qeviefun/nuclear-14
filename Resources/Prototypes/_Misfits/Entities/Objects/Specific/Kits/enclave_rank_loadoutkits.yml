- type: entity
  id: KitEnclave_CommandLaser
  name: command laser kit
  parent: KitBase
  description: A crate containing officer-grade laser weaponry, signaling tools, and sustain items for an Enclave commander.
  components:
  - type: Sprite
    state: pointman
  - type: Item
    size: Huge
  - type: SpawnItemsOnUse
    items:
      - id: N14ClothingOuterEnclaverOfficerCoat
      - id: ClothingBeltMilitary
      - id: N14WeaponLaserRifleWattz2000
      - id: N14WeaponLaserPistol
      - id: RadioHandheld
      - id: SmokeGrenade
        amount: 2
      - id: GrenadeFrag
      - id: N14Stimpak
      - id: N14SuperStimpak
      - id: N14CleanGauze10
        amount: 2
      - id: N14Flare
    sound:
      path: /Audio/Effects/unwrap.ogg

