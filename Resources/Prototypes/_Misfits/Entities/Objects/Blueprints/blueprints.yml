# Blueprint item entities for the tiered faction crafting system.
# Players find these in the world and place them in workbenches to unlock
# faction-specific recipes. Each blueprint is tied to a faction, tier, and
# workbench type (Weapons/Armor/Ammo).

# Abstract parent for all blueprint items
- type: entity
  parent: BaseItem
  id: N14BlueprintBase
  abstract: true
  name: blueprint
  description: A technical blueprint containing manufacturing schematics.
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    state: paper_words
  - type: Item
    size: Tiny
    shape:
    - 0,0,1,0
  - type: Tag
    tags:
    - Document
  - type: Blueprint
    recipes: []

