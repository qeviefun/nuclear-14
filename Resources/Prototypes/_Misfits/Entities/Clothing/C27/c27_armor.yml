  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_generic.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_generic.rsi

- type: entity
  parent: BaseC27ArmorMedium
  id: ClothingC27ArmorMediumNCR
  name: c-27 medium armor plating (ncr issue)
  description: NCR-issued reinforced plates for C-27 troopers. Standard republic frontline kit.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_ncr.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_ncr.rsi

- type: entity
  parent: BaseC27ArmorMedium
  id: ClothingC27ArmorMediumBoS
  name: c-27 medium armor plating (brotherhood issue)
  description: Brotherhood of Steel reinforced plates for C-27 knights. Brotherhood blue with steel-plate accents.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_bos.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_medium_bos.rsi

# === Concrete: Heavy tier (PA-marker) ===

- type: entity
  parent: BaseC27ArmorHeavy
  id: ClothingC27ArmorHeavyGeneric
  name: c-27 heavy armor plating
  description: Composite ablative plating bolted directly to the chassis. As close to a power-armor frame as a C-27 can get without one bolted on top.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_generic.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_generic.rsi

- type: entity
  parent: BaseC27ArmorHeavy
  id: ClothingC27ArmorHeavyNCR
  name: c-27 heavy armor plating (ncr issue)
  description: NCR heavy composite plates for C-27 heavy troopers. Republic gold-and-khaki paint over heavy ablative plate.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_ncr.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_ncr.rsi

- type: entity
  parent: BaseC27ArmorHeavy
  id: ClothingC27ArmorHeavyBoS
  name: c-27 heavy armor plating (brotherhood issue)
  description: Brotherhood of Steel heavy composite plates for C-27 paladins. Battle-worn brotherhood blue over reinforced ablative plating.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_bos.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_heavy_bos.rsi
