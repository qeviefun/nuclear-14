# Priestess of Mars clothing prototypes.
# These inherit directly from the base items so sprites/stats are identical,
# but carry the lore-accurate Priestess of Mars display names and descriptions.

# Robes — worn in the uniform/jumpsuit slot
- type: entity
  parent: N14ClothingUniformJumpsuitBOSRed
  id: N14PriestessOfMarsRobes
  name: Priestess of Mars Robes
  description: A deep crimson undersuit adorned with sacred iconography of the god of war. Worn by the holy women who bless Caesar's warriors before battle.

# Cloak — worn in the neck slot; the toggleable hood state is inherited
- type: entity
  parent: ClothingNeckCloakGoliathCloak
  id: N14PriestessOfMarsCloak
  name: Priestess of Mars Cloak
  description: A worn cloak of goliath hide draped across the shoulders of Mars's chosen. Its age only adds to its reverence.

# Veil — worn in the mask slot; inherits the pullable toggle
- type: entity
  parent: N14ClothingMaskRedMask
  id: N14PriestessOfMarsVeil
  name: Priestess of Mars Veil
  description: A crimson veil that partially obscures the face of the priestess, marking her as set apart from the common women of the Legion.

# Gloves — worn in the hands slot
- type: entity
  parent: ClothingHandsGlovesColorRed
  id: N14PriestessOfMarsGloves
  name: Priestess of Mars Gloves
  description: Neat red gloves worn during sacred rites and daily ministry alike.

# Boots — worn in the shoes slot
- type: entity
  parent: N14ClothingBootsBlack
  id: N14PriestessOfMarsBoots
  name: Priestess of Mars Boots
  description: Simple black boots suited for the dusty ground of the Legion's encampments.

# Satchel — worn in the belt slot; inherits the small storage grid
- type: entity
  parent: ClothingBeltStorageWaistbag
  id: N14PriestessOfMarsSatchel
  name: Priestess of Mars Satchel
  description: A worn leather satchel used to carry sacred texts, medicinal supplies, and whatever else the priestess might need during her duties.
