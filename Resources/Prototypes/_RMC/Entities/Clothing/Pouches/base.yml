# #Misfits Add - RMC pouch base prototypes ported from RMC-14 (MIT)
# Abstract hierarchy for all RMC-style pouches (pocket slot equipment)
# Stripped: InteractedBlacklist, StoreAfterFailedInteract, RMCStorageEjectHand, CMStorageVisualizer (not ported)

# Base pouch - all pouches inherit from this
- type: entity
  abstract: true
  parent: Clothing
  id: RMCPouch
  name: pouch
  description: A small, versatile pouch for carrying things around.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/small_drop.rsi
    state: icon
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/small_drop.rsi
    slots:
    - POCKET
  - type: Item
    size: Large
  - type: ExplosionResistance
    damageCoefficient: 0.9

# Pouch with Storage grid
- type: entity
  abstract: true
  parent: [RMCPouch, BaseStorageItem]
  id: RMCPouchStorage
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1 # 1 slot

# Pouch with a single closed visual layer
- type: entity
  abstract: true
  parent: RMCPouchStorage
  id: RMCPouchClosed
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: closed
      map: [ "closedLayer" ]
  - type: Appearance

# Pouch with open + closed visual layers
- type: entity
  abstract: true
  parent: RMCPouchStorage
  id: RMCPouchOpenClosed
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: open
      map: [ "openLayer" ]
    - state: closed
      map: [ "closedLayer" ]
  - type: Appearance

# Pouch with fill-level visuals for CMItemSlots
- type: entity
  abstract: true
  parent: RMCPouch
  id: RMCPouchFill
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: full
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          True: { visible: true }
          False: { visible: false }
