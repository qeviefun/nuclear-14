# #Misfits Add - RMC weapon pouches ported from RMC-14 (MIT)
# Pouches that hold weapons via CMItemSlots (knife, pistol, machete)

# Bayonet/knife sheath pouch (holds 5 knives)
- type: entity
  parent: RMCPouchFill
  id: RMCPouchBayonet
  name: bayonet sheath
  description: A sheath designed to hold knives. Can hold up to 5.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/bayonet.rsi
    layers:
    - state: icon
    - state: closed #Misfits Fix - bayonet.rsi has open/closed not partial/full
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/bayonet.rsi
  - type: ContainerContainer
  - type: ItemSlots
  - type: CMHolster
  - type: CMItemSlots
    cooldown: 1
    cooldownPopup: You need to wait before drawing another knife!
    count: 5
    slot:
      name: Knife
      whitelist:
        tags:
        - ThrowingKnife

# Pistol holster pouch (holds one sidearm with per-gun visual underlays)
- type: entity
  parent: RMCPouch
  id: RMCPouchPistol
  name: pistol pouch
  description: A pouch holster designed to carry a sidearm.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/pistol.rsi
    layers:
    - state: icon
    - state: closed #Misfits Fix - pistol.rsi has no 'full' state, using 'closed'
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/pistol.rsi
  - type: ContainerContainer
    containers:
      pouch:
        !type:ContainerSlot
  - type: ItemSlots
    slots:
      pouch:
        name: Sidearm holster
        insertSound: /Audio/_RMC/Weapons/Guns/gun_pistol_sheathe.ogg
        ejectSound: /Audio/_RMC/Weapons/Guns/gun_pistol_draw.ogg
        whitelist:
          tags:
          - Sidearm
  - type: CMHolster
    whitelist:
      tags:
      - Sidearm
  - type: CMItemSlots
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          True: { visible: true }
          False: { visible: false }

# Machete sheath pouch
- type: entity
  parent: RMCPouch
  id: RMCPouchMachete
  name: machete sheath
  description: A sheath designed to hold a machete.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/machete.rsi
    layers:
    - state: sheath #Misfits Fix - machete.rsi has sheath/sheath-machete not icon/full
    - state: sheath-machete #Misfits Fix - machete.rsi fill state
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/machete.rsi
  - type: ContainerContainer
    containers:
      pouch:
        !type:ContainerSlot
  - type: ItemSlots
    slots:
      pouch:
        name: Machete sheath
        whitelist:
          tags:
          - Machete
  - type: CMHolster
    whitelist:
      tags:
      - Machete
  - type: CMItemSlots
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          True: { visible: true }
          False: { visible: false }
