# #Misfits Add - RMC storage pouches ported from RMC-14 (MIT)
# Non-weapon pouches with Storage grids. Stripped: Filled variants, ItemCamouflage, StorageStoreSkillRequired

# General purpose pouch
- type: entity
  parent: RMCPouchOpenClosed
  id: RMCPouchGeneral
  name: general pouch
  description: A general purpose pouch used to carry small items.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/small_drop.rsi
    layers:
    - state: icon
    - state: open
      map: [ "openLayer" ]
    - state: closed
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/small_drop.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,1 # 2 slots

