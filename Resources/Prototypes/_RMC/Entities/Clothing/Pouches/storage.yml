# Flare pouch (uses CMItemSlots for individual flares)
- type: entity
  parent: RMCPouchFill
  id: RMCPouchFlare
  name: flare pouch
  description: A pouch designed to hold flares. Holds up to 16 flares.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Pouches/flare.rsi
    layers:
    - state: icon
    - state: closed #Misfits Fix - flare.rsi has open/closed not partial/full
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Pouches/flare.rsi
  - type: ContainerContainer
  - type: ItemSlots
  - type: CMItemSlots
    cooldown: 0.5
    count: 16
    slot:
      name: Flare
      whitelist:
        tags:
        - Flare

