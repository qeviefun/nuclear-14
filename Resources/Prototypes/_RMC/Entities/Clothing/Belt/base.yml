# #Misfits Add - RMC belt base prototypes ported from RMC-14 (MIT)
# Abstract hierarchy for all RMC-style belts
# Stripped: InteractedBlacklist, RMCStorageEjectHand, StoreAfterFailedInteract, CMStorageVisualizer

# Base belt - all RMC belts inherit from this
- type: entity
  abstract: true
  parent: ClothingBeltBase
  id: CMBeltBase
  components:
  - type: ExplosionResistance
    damageCoefficient: 0.9

# Belt with storage but no visual fill layers
- type: entity
  abstract: true
  parent: [CMBeltBase, BaseStorageItem]
  id: RMCBeltBaseStorageNoVisuals
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,13,3 # 14 slots

# Belt with storage + half/full visual layers
- type: entity
  abstract: true
  parent: RMCBeltBaseStorageNoVisuals
  id: CMBeltBaseStorage
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Appearance
