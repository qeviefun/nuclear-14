# #Misfits Add - RMC belt prototypes ported from RMC-14 (MIT)
# Concrete belt entities. Stripped: Filled variants, ItemCamouflage, CMStorageVisualizer, faction variants

# === SIMPLE BELTS (no storage) ===

- type: entity
  parent: ClothingBeltBase
  id: CMBeltInflatable
  name: inflatable duck
  description: No bother to sink or swim when you can just float!
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/inflatable.rsi
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/inflatable.rsi

# === AMMO BELTS ===

# Standard marine ammo rig (5 slots for magazines)
- type: entity
  parent: CMBeltBaseStorage
  id: CMBeltMarine
  name: M276 pattern ammo load rig
  description: A standard load-bearing equipment rig. Modular belt with various clips designed for bulk ammunition-carrying operations.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/marine/jungle-classic.rsi
    layers:
    - state: icon
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/marine/jungle-classic.rsi
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,1 # 5 slots
    whitelist:
      tags:
      - Flare
      - RMCShellShotgun
      - CMMagazinePistol
      - RMCMagazineRevolver
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
      - CMMagazineSniper
      - Grenade
      components:
      - BallisticAmmoProvider
    blacklist:
      tags:
      - RMCAttachmentUnderbarrel
  - type: IgnoreContentsSize
    items:
      tags:
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
  - type: FixedItemSizeStorage

# === TOOL BELTS ===

# Standard toolbelt (10 tool slots)
- type: entity
  parent: CMBeltBaseStorage
  id: CMBeltUtility
  name: M276 pattern toolbelt rig
  description: A modular belt designed for engineers to transport tools. It lacks combat functionality.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/utility.rsi
    layers:
    - state: icon
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/utility.rsi
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,19,1 # 10 slots
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - PowerCell
      components:
      - Welder
      - PowerCell
      - TrayScanner
      - GasAnalyzer
      - LightReplacer
  - type: IgnoreContentsSize
    items:
      components:
      - LightReplacer
  - type: FixedItemSizeStorage

# Combat toolbelt with sidearm holster (9 slots + gun)
- type: entity
  parent: CMBeltUtility
  id: CMBeltUtilityCombat
  name: M276 pattern combat toolbelt rig
  description: A modular belt with tool clips and a sidearm holster. Designed for engineers working in combat zones.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/combat_utility.rsi
    layers:
    - state: icon
    - sprite: _RMC/Objects/Clothing/Belt/combat_utility.rsi
      state: icon-front
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/combat_utility.rsi
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,17,1 # 9 slots
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - Sidearm
      - CMMagazinePistol
      - RMCMagazineRevolver
      - PowerCell
      - RMCShellShotgun
      components:
      - Welder
      - PowerCell
      - TrayScanner
      - GasAnalyzer
      - LightReplacer
  - type: FixedItemSizeStorage
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-one-gun
      whitelist:
        components:
        - Gun
  - type: CMHolster
    whitelist:
      components:
      - Gun

# === KNIFE BELT ===

- type: entity
  parent: CMBeltBase
  id: CMBeltKnife
  name: M276 pattern knife rig
  description: A belt specially designed to store throwing knives. Holds up to 12.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/knife/jungle-classic.rsi
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/knife/jungle-classic.rsi
  - type: ItemSlots
  - type: CMHolster
  - type: CMItemSlots
    cooldown: 1
    cooldownPopup: You need to wait before drawing another knife!
    count: 12
    slot:
      name: Knife
      whitelist:
        tags:
        - ThrowingKnife

