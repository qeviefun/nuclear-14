# === PISTOL HOLSTER BELT ===

- type: entity
  parent: CMBeltBaseStorage
  id: RMCBeltHolsterPistol
  name: M276 pattern general pistol holster rig
  description: A modular belt with a holster assembly for carrying a sidearm and spare magazines.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/holster_pistol/classic-jungle.rsi
    layers:
    - state: icon
    - state: icon-front
      map: [ "holstered" ]
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/holster_pistol/classic-jungle.rsi
    slots:
    - suitStorage
    - belt
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - Sidearm
      - CMMagazinePistol
    blacklist:
      tags:
      - RMCRevolver
  - type: FixedItemSizeStorage
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-one-gun
      whitelist:
        tags:
        - Sidearm
    - popup: rmc-storage-limit-max-mags
      count: 6
      whitelist:
        tags:
        - CMMagazinePistol
  - type: CMHolster
    whitelist:
      tags:
      - Sidearm
  - type: Tag
    tags:
    - RMCGeneralPistolHolster
  - type: ItemMapper
    spriteLayers:
    - holstered
    mapLayers:
      holstered:
        whitelist:
          tags:
          - Sidearm

