# === SHOTGUN SHELL LOADING RIG ===

- type: entity
  parent: RMCBeltBaseStorageNoVisuals
  id: RMCM276ShotgunShellLoadingRig
  name: M276 pattern shotgun shell loading rig
  description: An ammunition belt designed to hold shotgun shells.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
    layers:
    - state: icon
    - state: sixth
      visible: false
    - state: third
      visible: false
    - state: half
      visible: false
    - state: twothirds
      visible: false
    - state: fivesixths
      visible: false
    - state: full
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,13,3 # 14 slots
    whitelist:
      tags:
      - RMCShellShotgun
  - type: IgnoreContentsSize
    items:
      tags:
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
  - type: FixedItemSizeStorage
  - type: ItemMapper
    mapLayers:
      sixth:
        minCount: 1
        whitelist:
          tags:
          - RMCShellShotgun
      third:
        minCount: 3
        whitelist:
          tags:
          - RMCShellShotgun
      half:
        minCount: 6
        whitelist:
          tags:
          - RMCShellShotgun
      twothirds:
        minCount: 9
        whitelist:
          tags:
          - RMCShellShotgun
      fivesixths:
        minCount: 12
        whitelist:
          tags:
          - RMCShellShotgun
      full:
        minCount: 14
        whitelist:
          tags:
          - RMCShellShotgun

