# === SMG HOLSTER ===

- type: entity
  parent: ClothingBeltBase
  id: RMCBeltHolsterSMG
  name: M276 pattern SMG holster rig
  description: A holster designed to carry a submachine gun.
  components:
  - type: Sprite
    sprite: _RMC/Objects/Clothing/Belt/holster_smg.rsi
    layers:
    - state: icon
    - state: icon
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      visible: false
  - type: Clothing
    sprite: _RMC/Objects/Clothing/Belt/holster_smg.rsi
    slots:
    - suitStorage
    - belt
  - type: Item
    size: Large
  - type: ContainerContainer
    containers:
      pouch:
        !type:ContainerSlot
  - type: ItemSlots
    slots:
      pouch:
        name: SMG holster
        insertSound: /Audio/_RMC/Weapons/Guns/gun_pistol_sheathe.ogg
        ejectSound: /Audio/_RMC/Weapons/Guns/gun_pistol_draw.ogg
        whitelist:
          tags:
          - RMCWeaponSMG
  - type: CMHolster
    whitelist:
      tags:
      - RMCWeaponSMG
  - type: CMItemSlots
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          True: { visible: true }
          False: { visible: false }
  - type: Tag
    tags:
    - RMCSMGHolster

