- type: entity
  parent: ClothingOuterHardsuitBase
  id: N14ClothingOuterPowerArmorT45
  name: t-45 power armor
  description: An old suit of T-45 Power Armor. It's amazing these still exist.
  components:
  - type: N14PowerArmor # #Misfits Change Add: Marks this and all child power armor variants. Used by CarryingSystem to block non-PA users from picking up PA wearers.
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/PowerArmor/t45.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/PowerArmor/t45.rsi
    equipDelay: 3 # Power armour should not be easily stealable, it should take time to take off or put on.
    unequipDelay: 6
    equipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Enter_01.ogg
      params:
        volume: -12
    unequipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Enter_01.ogg
      params:
        volume: -12
  - type: ClothingSpeedModifier
    walkModifier: 0.2
    sprintModifier: 0.2
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.55
        Heat: 0.55
        Caustic: 0.75
        Radiation: 0.6
  - type: UserInterface
    interfaces:
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: ToggleableClothing
    requiredSlot: outerClothing
    blockUnequipWhenAttached: true
    replaceCurrentClothing: false
    clothingPrototypes:
      head: N14ClothingHeadHelmetPowerArmorT45
      gloves: N14ClothingPAGauntlets
      shoes: N14ClothingPABoots
      back: N14ClothingPowerSystemsBack
  - type: TemperatureProtection
    coefficient: 0.25
  - type: FireProtection
    reduction: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: HeldSpeedModifier
    mirrorClothingModifier: false
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: MultiHandedItem
  - type: Reflect # #Misfits Change Tweak: Small-caliber rounds (sub-5.56mm) ricochet off power armor at 75% chance. Innate - always active regardless of movement.
    reflects:
      - SmallCaliber
    reflectProb: 0.5
    innate: true
    spread: 90
  - type: SpearBlock # #Misfits Change Add: Power armor deflects thrown polearms; falls to ground instead of embedding.
  - type: PowerArmorBrace # #Misfits Change Add: Grants wearer a hotkey to brace (anchor in place, immobile but can fire, slight damage resistance). 5-second cooldown between stance changes.
    activeModifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
  - type: EmitsSoundOnMove # Corvax-Change
    soundCollection:
      collection: N14FootstepPowerArmor
      params:
        volume: -6
    requiresWorn: true
    distanceWalking: 2
    distanceSprinting: 3

