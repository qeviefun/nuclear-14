- type: entity
  parent: ClothingOuterHardsuitBase
  id: N14ClothingOuterPowerArmorT45
  name: t-45 power armor
  description: An old suit of T-45 Power Armor. It's amazing these still exist.
  components:
  - type: N14PowerArmor # #Misfits Change Add: Marks this and all child power armor variants. Used by CarryingSystem to block non-PA users from picking up PA wearers.
  - type: N14BosBackpackSlot # #Misfits Add: All power armor gets an extra backpack slot — fusion core occupies the normal back slot
  # #Misfits Add: Power armor integrity — separate HP pool that absorbs a fraction of incoming
  # damage before it reaches the wearer. Degrades through tiers and can be repaired with a welder.
  - type: Damageable
  - type: PowerArmorIntegrity
    maxIntegrity: 200
    absorptionRatio: 0.50
    degradationTiers:
    - threshold: 0.66
      absorption: 0.35
    - threshold: 0.33
      absorption: 0.20
  - type: Repairable
    fuelCost: 10
    doAfterDelay: 5
    qualityNeeded: Welding
  # End Misfits Add
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/PowerArmor/t45.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/PowerArmor/t45.rsi
    equipDelay: 3 # Power armour should not be easily stealable, it should take time to take off or put on.
    unequipDelay: 6
    equipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Enter_01.ogg
      params:
        volume: -12
    unequipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Enter_01.ogg
      params:
        volume: -12
  - type: ClothingSpeedModifier
    walkModifier: 0.2
    sprintModifier: 0.2
  - type: Armor # #Misfits Change: Melee coefficients raised to reduce double-dip with integrity. Heat removed — integrity is sole laser protection.
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Caustic: 0.75
        Radiation: 0.6
  - type: UserInterface
    interfaces:
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: ToggleableClothing
    requiredSlot: outerClothing
    blockUnequipWhenAttached: true
    replaceCurrentClothing: false
    clothingPrototypes:
      head: N14ClothingHeadHelmetPowerArmorT45BOS # #Misfits Change - BOS T45 now spawns the Brotherhood tactical-HUD helmet
      gloves: N14ClothingPAGauntlets
      shoes: N14ClothingPABoots
      back: N14ClothingPowerSystemsBack
  - type: TemperatureProtection
    coefficient: 0.25
  - type: FireProtection
    reduction: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.15 # #Misfits Tweak: PA shrugs off most grenade blast — ~18 HP at ground zero vs 120 unarmored
  - type: HeldSpeedModifier
    mirrorClothingModifier: false
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: MultiHandedItem
  - type: Reflect # #Misfits Change Tweak: Small-caliber rounds (sub-5.56mm) ricochet off power armor at 30% chance. Innate - always active regardless of movement.
    reflects:
      - SmallCaliber
      - MediumCaliber
    reflectProb: 0.3
    reflectProbByType:
      MediumCaliber: 0.15
    innate: true
    spread: 90
  - type: SpearBlock # #Misfits Change Add: Power armor deflects thrown polearms; falls to ground instead of embedding.
  - type: PowerArmorBrace # #Misfits Change Add: Grants wearer a hotkey to brace (anchor in place, immobile but can fire, slight damage resistance). 5-second cooldown between stance changes.
    activeModifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
  - type: EmitsSoundOnMove # Corvax-Change
    soundCollection:
      collection: N14FootstepPowerArmor
      params:
        volume: -6
    requiresWorn: true
    distanceWalking: 2
    distanceSprinting: 3

