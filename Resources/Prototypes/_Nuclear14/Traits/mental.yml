- type: trait
  id: N14CarefulSteps
  category: Mental
  points: -4
  functions:
    - !type:TraitAddComponent
      components:
        - type: StepTriggerImmune
          whitelist:
            types:
              - Shard
              - Landmine
              - Mousetrap
              - SlipEntity

- type: trait
  id: N14Pickpocket
  category: Mental
  points: -6
  functions:
    - !type:TraitReplaceComponent
      components:
        - type: Thieving
          ignoreStripHidden: true
          stealth: Subtle
          stripTimeReduction: 0
          stripTimeMultiplier: 0.667

- type: trait
  id: N14Pacifist
  category: Mental
  points: 8
  requirements:
    - !type:CharacterJobRequirement
      inverted: true
      jobs:
        - TownSheriff
        - TownDeputy
        - NCRCaptain
        - NCRLT
        - RangerVeteran
        - Ranger
        - RangerRecruit
        - NCRDoctor
        - NCRFirstSergeant
        - NCRStaffSergeant
        - NCRSGT
        - NCRWS
        #- NCREngineer #Misfits Change /Comment-out/: consolidated into Specialist
        - NCRPrivateFirstClass
        - NCRSoldier
        - NCRCadet
#        - CaravanGuard
        #- BoSWashingtonCommander #Misfits Change /Comment-out/: Washington BoS removed
        #- BoSWashingtonPaladin
        #- BoSWashingtonKnight
        #- BoSWashingtonInitiate
        - BoSMidPaladinCommander
        - BoSMidPaladin
        - BoSMidKnight
        - BoSMidSquire
        # Forge-Change-Start
        - NCRMPinvestigator
        #- BoSMidInquisitor # Misfits Fix: job prototype commented out
        - BoSWestElderCommander
        - CaesarLegionCenturion
        - CaesarLegionLegate
        - CaesarLegionVeteranDecanus
        - CaesarLegionFrumentarii
        - CaesarLegionPrimeDecanus
        - CaesarLegionVexillarius
        - CaesarLegionExplorer
        - CaesarLegionOrator
        - CaesarLegionDean
        - CaesarLegionLegionnaireVeteran
        - CaesarLegionLegionnaireWarrior
        - CaesarLegionLegionnaireRecruit
        - CaesarLegionHoundmaster
        - CaesarLegionAuxilia
        # #Misfits Change: CaesarLegionRecruit removed — Legionnaire covers entry-level.
        # Forge-Change-End
        - VaultSecurity
  functions:
    - !type:TraitAddComponent
      components:
        - type: Pacified

- type: trait
  id: N14Narcolepsy
  category: Mental
  points: 2
  functions:
    - !type:TraitAddComponent
      components:
      - type: Narcolepsy
        timeBetweenIncidents: 300, 600
        durationOfIncident: 10, 30

- type: trait
  id: N14CPRTraining
  category: Mental
  points: -8 # #Misfits Tweak - raised from -4; CPR is a strong revival tool, cost should reflect that
  requirements:
    - !type:CharacterJobRequirement
      inverted: true
      jobs:
        - TribalHealer
        - TownDoctor
        - NCRDoctor
        #- NCRMedic #Misfits Change /Comment-out/: consolidated into Specialist
        #- BoSWashingtonScribe #Misfits Change /Comment-out/: Washington BoS removed
        - BoSMidScribe
        - VaultDoctor
        - Followers # Forge-Change
  functions:
    - !type:TraitAddComponent
      components:
        - type: CPRTraining

- type: trait
  id: N14SelfAware
  category: Mental
  points: -4
  functions:
    - !type:TraitAddComponent
      components:
        - type: SelfAware
          analyzableTypes:
            - Blunt
            - Slash
            - Piercing
            - Heat
            - Shock
            - Cold
            - Caustic
          detectableGroups:
            - Airloss
            - Toxin

- type: trait
  id: N14Liar
  category: Mental
  points: 1
  requirements:
    - !type:CharacterTraitRequirement
      inverted: true
      traits:
        - N14FrontalLisp
        - N14ScottishAccent
        - N14Stutter
  functions:
    - !type:TraitAddComponent
      components:
        - type: ReplacementAccent
          replacementChance: 0.2
          accent: liar

