- type: dungeonConfig
  id: NFHaunted
  generator: !type:PrefabDunGen
    tile: FloorCaveDrought
    roomWhitelist:
      - NFHaunted
    presets:
      - Bucket
      - Wow
      - SpaceShip
      - Tall
  postGeneration:
    - !type:WormCorridorPostGen
      width: 3
      tile: FloorCaveDrought

    - !type:CorridorClutterPostGen
      contents:
        - id: FloraStalagmite1
        - id: FloraStalagmite2
        - id: FloraStalagmite3
        - id: FloraStalagmite4
        - id: FloraStalagmite5
        - id: FloraStalagmite6

    - !type:BoundaryWallPostGen
      tile: FloorCaveDrought
      wall: WallRock


- type: dungeonConfig
  id: NFMineshaft
  generator: !type:PrefabDunGen
    tile: FloorCaveDrought
    roomWhitelist:
      - NFMineshaft
    presets:
      - Bucket
      - Wow
      - SpaceShip
      - Tall
  postGeneration:
    - !type:CorridorPostGen
      tile: FloorCaveDrought
      width: 3

    - !type:DungeonEntrancePostGen
      count: 5
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall

    - !type:RoomEntrancePostGen
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall

    - !type:EntranceFlankPostGen
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall

    - !type:ExternalWindowPostGen
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall

    - !type:WallMountPostGen
      tile: FloorCaveDrought
      spawns:
        - id: WallRockSalt
          prob: 0.6
          orGroup: content
        - id: WallRockCoal
          prob: 0.6
          orGroup: content
        - id: WallRockTin
          prob: 0.4
          orGroup: content
        - id: WallMining
          prob: 0.8
          orGroup: content

    - !type:BoundaryWallPostGen
      tile: FloorCaveDrought
      wall: WallRock
      cornerWall: WallRock

    - !type:AutoCablingPostGen
      entity: Catwalk

    - !type:JunctionPostGen
      tile: FloorCaveDrought
      width: 3
      entities:
        - RandomWoodenSupport

    - !type:CornerClutterPostGen
      contents:
        - id: RandomStalagmiteOrCrystal
          amount: 1


