name: Publish
concurrency:
  group: publish


on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3.6.0
      with:
        submodules: 'recursive'

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3.2.0
      with:
        dotnet-version: 10.0.x

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64 --config-file /Resources/ConfigPresets/MNW14/mnw.toml

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Publish version
      run: Tools/publish_multi_request.py
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        ROBUST_CDN_URL: ${{ secrets.ROBUST_CDN_URL }}
        GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY }}

    - name: Notify watchdog to update server
      env:
        SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        WATCHDOG_API_USER: ${{ secrets.WATCHDOG_API_USER }}
        WATCHDOG_API_KEY: ${{ secrets.WATCHDOG_API_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" \
          "curl -s -f -X POST -u '$WATCHDOG_API_USER:$WATCHDOG_API_KEY' http://localhost:5000/instances/NuclearWasteland/update"
        rm -f ~/.ssh/deploy_key

    # - name: Publish changelog (Discord)
